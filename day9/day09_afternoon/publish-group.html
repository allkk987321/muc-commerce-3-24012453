<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>发布拼单搭子 - 校园轻集市</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<div class="page-wrapper">
  <nav class="navbar"><div class="navbar-inner">
    <a href="home.html" class="navbar-brand"><div class="brand-icon">🏪</div>校园轻集市</a>
    <div class="navbar-nav">
      <a href="home.html" class="nav-link">🏠 首页</a><a href="category.html" class="nav-link">📋 浏览集市</a><a href="publish.html" class="nav-link active">✏️ 发布信息</a>
      <div class="navbar-actions"><a href="messages.html" class="btn btn-ghost btn-icon" title="消息">💬</a><a href="profile.html" class="btn btn-ghost btn-icon" title="个人中心">👤</a></div>
    </div>
  </div></nav>
  <div class="main-content"><div class="container">
    <div class="page-header"><h1 class="page-title">🤝 发布拼单搭子</h1><p class="page-subtitle">发起拼单或寻找搭子，结伴同行</p></div>
    <div class="publish-layout">
      <div class="publish-form">
        <form onsubmit="event.preventDefault();alert('发布成功！');location.href='category.html?type=group'">
          <div class="form-group"><label class="form-label">拼单/搭子标题 <span class="required">*</span></label><input type="text" class="form-input" placeholder="例如：奶茶拼单！一点点四季春" required></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">目标人数 <span class="required">*</span></label><input type="number" class="form-input" placeholder="4" min="2" required></div>
            <div class="form-group"><label class="form-label">截止时间 <span class="required">*</span></label><input type="datetime-local" class="form-input" required></div>
          </div>
          <div class="form-group"><label class="form-label">详情描述 <span class="required">*</span></label><textarea class="form-textarea" placeholder="描述拼单/搭子的具体内容、要求..." required></textarea></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">校区 <span class="required">*</span></label><select class="form-select"><option>南校区</option><option>北校区</option><option>东校区</option><option>西校区</option></select></div>
            <div class="form-group"><label class="form-label">活动地点</label><input type="text" class="form-input" placeholder="例如：图书馆"></div>
          </div>
          <div class="form-group"><label class="form-label">标签</label><input type="text" class="form-input" placeholder="用逗号分隔，例如：奶茶,一点点,拼单"></div>
          <div class="form-group" style="margin-top:24px;"><button type="submit" class="btn btn-primary btn-lg btn-block">发布信息</button></div>
          <p style="text-align:center;margin-top:12px;"><a href="publish.html">← 选择其他类型</a></p>
        </form>
      </div>
      <div class="publish-tips"><h4>💡 发布贴士</h4><ul><li>明确写明目标人数和截止时间</li><li>拼单说明费用分摊方式</li><li>搭子活动说明具体安排</li><li>及时更新已有人数</li><li>截止后记得更新状态</li></ul></div>
    </div>
  </div></div>
</div>
</body>
</html>
