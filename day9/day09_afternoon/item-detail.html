<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>商品详情 - 校园轻集市</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<div class="page-wrapper">
  <nav class="navbar"><div class="navbar-inner">
    <a href="home.html" class="navbar-brand"><div class="brand-icon">🏪</div>校园轻集市</a>
    <div class="search-box"><input type="text" placeholder="搜索..."><button>🔍</button></div>
    <div class="navbar-nav">
      <a href="home.html" class="nav-link">🏠 首页</a><a href="category.html" class="nav-link">📋 浏览集市</a><a href="publish.html" class="nav-link">✏️ 发布信息</a>
      <div class="navbar-actions"><a href="messages.html" class="btn btn-ghost btn-icon" title="消息">💬</a><a href="profile.html" class="btn btn-ghost btn-icon" title="个人中心">👤</a></div>
    </div>
  </div></nav>
  <div class="main-content"><div class="container">
    <div id="detail-content"></div>
  </div></div>
</div>
<script src="js/data.js"></script>
<script>
const params = new URLSearchParams(location.search);
const item = getItemById(parseInt(params.get('id'))) || items.find(i => i.type === 'secondhand');
const publisher = getUserById(item.publisherId);
const favIds = getFavoriteItemIds('u1');
const isFav = favIds.includes(item.id);

document.getElementById('detail-content').innerHTML = `
  <div style="margin-bottom:16px;"><a href="category.html?type=secondhand" style="color:var(--text-tertiary);">← 返回二手交易列表</a></div>
  <div class="detail-header">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
      <span class="type-tag type-secondhand">🛒 二手交易</span>
      <span class="tag tag-gray">${getStatusLabel(item.status)}</span>
    </div>
    <h1 class="detail-title">${item.title}</h1>
    <div class="detail-meta">
      <span>📍 ${item.campus} · ${item.location}</span>
      <span>🕐 ${item.createdAt}</span>
      <span>👀 ${item.viewCount} 浏览</span>
      <span>⭐ ${item.favoriteCount} 收藏</span>
    </div>
  </div>
  <div class="two-col">
    <div class="detail-body">
      <h3 style="margin-bottom:12px;">商品描述</h3>
      <p style="line-height:1.8;color:var(--text-secondary);">${item.description}</p>
      <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;">
        ${(item.tags || []).map(t => '<span class="tag tag-primary">'+t+'</span>').join('')}
      </div>
    </div>
    <div class="detail-sidebar">
      <div class="sidebar-card" style="text-align:center;">
        <div class="detail-price"><span class="unit">¥</span>${item.price}</div>
        <div style="color:var(--text-tertiary);font-size:13px;margin-bottom:16px;">成色：${item.condition}</div>
        <a href="chat.html?id=${item.id}" class="btn btn-primary btn-block btn-lg" style="margin-bottom:8px;">💬 联系卖家</a>
        <button class="btn ${isFav ? 'btn-warning' : 'btn-outline'} btn-block" onclick="toggleFav(${item.id})" id="fav-btn">
          ${isFav ? '⭐ 已收藏' : '☆ 收藏'}
        </button>
        ${item.allowBargain ? `
        <div style="margin-top:16px;padding:16px;background:var(--bg-input);border-radius:var(--radius-md);">
          <div style="font-weight:600;margin-bottom:8px;font-size:14px;">💰 模拟砍价</div>
          <div style="display:flex;gap:8px;">
            <input type="number" id="bargainInput" class="form-input" placeholder="输入你的出价" style="flex:1;">
            <button class="btn btn-secondary btn-sm" onclick="doBargain(${item.id}, ${item.price})">出价</button>
          </div>
          <div id="bargainResult" style="margin-top:8px;font-size:13px;"></div>
        </div>` : ''}
      </div>
      <div class="sidebar-card">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
          <div class="avatar">${publisher.nickname[0]}</div>
          <div>
            <div style="font-weight:600;">${publisher.nickname}</div>
            <div style="font-size:12px;color:var(--text-tertiary);">${publisher.college} · 信用分 ${publisher.creditScore}</div>
          </div>
        </div>
        <div class="safety-notice" style="margin:12px -16px -16px;border-radius:0 0 var(--radius-md) var(--radius-md);">
          <div class="safety-icon">🛡️</div>
          <div class="safety-text" style="font-size:12px;">请选择校内公共区域当面交易，贵重物品建议验机后确认。</div>
        </div>
      </div>
    </div>
  </div>`;

function toggleFav(id) {
  const btn = document.getElementById('fav-btn');
  if (btn.classList.contains('btn-warning')) {
    btn.className = 'btn btn-outline btn-block'; btn.textContent = '☆ 收藏';
  } else {
    btn.className = 'btn btn-warning btn-block'; btn.textContent = '⭐ 已收藏';
  }
}

function doBargain(id, price) {
  const offer = parseInt(document.getElementById('bargainInput').value);
  if (!offer || offer <= 0) { document.getElementById('bargainResult').innerHTML = '<span style="color:var(--danger);">请输入有效出价</span>'; return; }
  if (offer >= price) { document.getElementById('bargainResult').innerHTML = '<span style="color:var(--success);">卖家回复：这个价格可以！直接联系我吧~</span>'; }
  else if (offer >= price * 0.8) { document.getElementById('bargainResult').innerHTML = '<span style="color:var(--warning);">卖家回复：' + offer + '有点低了，' + Math.floor(price * 0.9) + '可以吗？</span>'; }
  else { document.getElementById('bargainResult').innerHTML = '<span style="color:var(--danger);">卖家回复：抱歉，这个价格太低了，最低' + Math.floor(price * 0.85) + '。</span>'; }
}
</script>
</body>
</html>
