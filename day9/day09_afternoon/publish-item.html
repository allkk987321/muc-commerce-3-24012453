<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>发布二手商品 - 校园轻集市</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<div class="page-wrapper">
  <nav class="navbar"><div class="navbar-inner">
    <a href="home.html" class="navbar-brand"><div class="brand-icon">🏪</div>校园轻集市</a>
    <div class="navbar-nav">
      <a href="home.html" class="nav-link">🏠 首页</a><a href="category.html" class="nav-link">📋 浏览集市</a><a href="publish.html" class="nav-link active">✏️ 发布信息</a>
      <div class="navbar-actions"><a href="messages.html" class="btn btn-ghost btn-icon" title="消息">💬</a><a href="profile.html" class="btn btn-ghost btn-icon" title="个人中心">👤</a></div>
    </div>
  </div></nav>
  <div class="main-content"><div class="container">
    <div class="page-header"><h1 class="page-title">🛒 发布二手商品</h1><p class="page-subtitle">发布闲置物品信息，让校内同学看到并联系你</p></div>
    <div class="publish-layout">
      <div class="publish-form">
        <form onsubmit="event.preventDefault();alert('发布成功！（教学演示）');location.href='category.html?type=secondhand'">
          <div class="form-group"><label class="form-label">商品标题 <span class="required">*</span></label><input type="text" class="form-input" placeholder="例如：九成新《算法导论》低价出" required></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">价格（元）<span class="required">*</span></label><input type="number" class="form-input" placeholder="0" required></div>
            <div class="form-group"><label class="form-label">成色 <span class="required">*</span></label><select class="form-select"><option>全新</option><option>九五成新</option><option>九成新</option><option>八成新</option><option>七成新及以下</option></select></div>
          </div>
          <div class="form-group"><label class="form-label">商品描述 <span class="required">*</span></label><textarea class="form-textarea" placeholder="描述商品的使用情况、配件、购买时间等信息..." required></textarea></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">校区 <span class="required">*</span></label><select class="form-select"><option>南校区</option><option>北校区</option><option>东校区</option><option>西校区</option></select></div>
            <div class="form-group"><label class="form-label">交易地点</label><input type="text" class="form-input" placeholder="例如：图书馆一楼"></div>
          </div>
          <div class="form-group"><label class="form-label">标签</label><input type="text" class="form-input" placeholder="用逗号分隔，例如：教材,计算机,算法"></div>
          <div class="form-group"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;"><input type="checkbox" checked> 允许砍价</label></div>
          <div class="form-group" style="margin-top:24px;"><button type="submit" class="btn btn-primary btn-lg btn-block">发布商品</button></div>
          <p style="text-align:center;margin-top:12px;"><a href="publish.html">← 选择其他类型</a></p>
        </form>
      </div>
      <div class="publish-tips"><h4>💡 发布贴士</h4><ul><li>标题清晰明确，包含品牌型号</li><li>上传清晰实物照片更有吸引力</li><li>描述使用时长和磨损情况</li><li>合理定价参考市场行情</li><li>选择校内公共区域当面交易</li></ul></div>
    </div>
  </div></div>
</div>
</body>
</html>
