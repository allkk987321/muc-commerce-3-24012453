<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>我的发布 - 校园轻集市</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<div class="page-wrapper">
  <nav class="navbar"><div class="navbar-inner">
    <a href="home.html" class="navbar-brand"><div class="brand-icon">🏪</div>校园轻集市</a>
    <div class="navbar-nav">
      <a href="home.html" class="nav-link">🏠 首页</a><a href="category.html" class="nav-link">📋 浏览集市</a><a href="publish.html" class="nav-link">✏️ 发布信息</a>
      <div class="navbar-actions"><a href="messages.html" class="btn btn-ghost btn-icon" title="消息">💬</a><a href="profile.html" class="btn btn-ghost btn-icon" title="个人中心">👤</a></div>
    </div>
  </div></nav>
  <div class="main-content"><div class="container">
    <div class="profile-tabs">
      <a href="my-posts.html" class="profile-tab active">📋 我的发布</a>
      <a href="favorites.html" class="profile-tab">⭐ 我的收藏</a>
      <a href="settings.html" class="profile-tab">⚙️ 账号设置</a>
    </div>
    <div id="posts-list" style="display:flex;flex-direction:column;gap:12px;"></div>
  </div></div>
</div>
<script src="js/data.js"></script>
<script>
const posts = getUserPosts('u1');
const detailPages = { secondhand:'item-detail.html', lostfound:'lost-detail.html', group:'group-detail.html', errand:'task-detail.html' };
document.getElementById('posts-list').innerHTML = posts.length === 0
  ? '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">还没有发布任何信息</div><a href="publish.html" class="btn btn-primary" style="margin-top:12px;">去发布</a></div>'
  : posts.map(p => `<div class="card" style="display:flex;justify-content:space-between;align-items:center;">
    <div style="flex:1;min-width:0;">
      <a href="${detailPages[p.type]}?id=${p.id}" style="font-weight:600;color:var(--text-primary);">${p.title}</a>
      <div style="font-size:12px;color:var(--text-tertiary);margin-top:4px;">${getTypeLabel(p.type)} · ${getStatusLabel(p.status)} · ${formatTime(p.createdAt)}</div>
    </div>
    <select class="form-select" style="width:auto;" onchange="this.previousElementSibling.textContent=this.value">
      <option>${getStatusLabel(p.status)}</option>
      <option>进行中</option><option>已完成</option><option>已关闭</option><option>已解决</option>
    </select>
  </div>`).join('');
</script>
</body>
</html>
