<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>我的收藏 - 校园轻集市</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<div class="page-wrapper">
  <nav class="navbar"><div class="navbar-inner">
    <a href="home.html" class="navbar-brand"><div class="brand-icon">🏪</div>校园轻集市</a>
    <div class="navbar-nav">
      <a href="home.html" class="nav-link">🏠 首页</a><a href="category.html" class="nav-link">📋 浏览集市</a><a href="publish.html" class="nav-link">✏️ 发布信息</a>
      <div class="navbar-actions"><a href="messages.html" class="btn btn-ghost btn-icon" title="消息">💬</a><a href="profile.html" class="btn btn-ghost btn-icon" title="个人中心">👤</a></div>
    </div>
  </div></nav>
  <div class="main-content"><div class="container">
    <div class="profile-tabs">
      <a href="my-posts.html" class="profile-tab">📋 我的发布</a>
      <a href="favorites.html" class="profile-tab active">⭐ 我的收藏</a>
      <a href="settings.html" class="profile-tab">⚙️ 账号设置</a>
    </div>
    <div id="favs-list" style="display:flex;flex-direction:column;gap:12px;"></div>
  </div></div>
</div>
<script src="js/data.js"></script>
<script>
const favs = getUserFavorites('u1');
const detailPages = { secondhand:'item-detail.html', lostfound:'lost-detail.html', group:'group-detail.html', errand:'task-detail.html' };
const typeLabels = { secondhand:'🛒 二手', lostfound:'🔍 失物招领', group:'🤝 拼单', errand:'🏃 跑腿' };
document.getElementById('favs-list').innerHTML = favs.length === 0
  ? '<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-text">还没有收藏任何信息</div><a href="category.html" class="btn btn-primary" style="margin-top:12px;">去浏览</a></div>'
  : favs.map(f => `<a href="${detailPages[f.type]}?id=${f.id}" class="item-card">
    <div class="item-card-image">${typeLabels[f.type].split(' ')[0]}</div>
    <div class="item-card-body">
      <div class="item-card-title">${f.title}</div>
      <div class="item-card-desc">${f.description}</div>
      <div class="item-card-meta"><span>${getTypeLabel(f.type)}</span><span>${getStatusLabel(f.status)}</span><span>🕐 ${formatTime(f.createdAt)}</span></div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="event.preventDefault();this.closest('a').remove();" title="取消收藏">✕</button>
  </a>`).join('');
</script>
</body>
</html>
