<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>账号设置 - 校园轻集市</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<div class="page-wrapper">
  <nav class="navbar"><div class="navbar-inner">
    <a href="home.html" class="navbar-brand"><div class="brand-icon">🏪</div>校园轻集市</a>
    <div class="navbar-nav">
      <a href="home.html" class="nav-link">🏠 首页</a><a href="category.html" class="nav-link">📋 浏览集市</a><a href="publish.html" class="nav-link">✏️ 发布信息</a>
      <div class="navbar-actions"><a href="messages.html" class="btn btn-ghost btn-icon" title="消息">💬</a><a href="profile.html" class="btn btn-ghost btn-icon" title="个人中心">👤</a></div>
    </div>
  </div></nav>
  <div class="main-content"><div class="container">
    <div class="profile-tabs">
      <a href="my-posts.html" class="profile-tab">📋 我的发布</a>
      <a href="favorites.html" class="profile-tab">⭐ 我的收藏</a>
      <a href="settings.html" class="profile-tab active">⚙️ 账号设置</a>
    </div>
    <div class="card" style="max-width:600px;">
      <div class="card-body">
        <form onsubmit="event.preventDefault();alert('保存成功！');location.href='profile.html'">
          <div class="form-group">
            <label class="form-label">昵称</label>
            <input type="text" class="form-input" value="小明同学">
          </div>
          <div class="form-group">
            <label class="form-label">学院</label>
            <select class="form-select"><option>计算机科学与技术学院</option><option>人文学院</option><option>法学院</option></select>
          </div>
          <div class="form-group">
            <label class="form-label">校区</label>
            <select class="form-select"><option>南校区</option><option>北校区</option><option>东校区</option><option>西校区</option></select>
          </div>
          <div class="form-group">
            <label class="form-label">身份角色</label>
            <select class="form-select"><option>本科生</option><option>研究生</option></select>
          </div>
          <div class="form-group" style="margin-top:24px;">
            <button type="submit" class="btn btn-primary btn-block">保存修改</button>
          </div>
        </form>
      </div>
    </div>
  </div></div>
</div>
