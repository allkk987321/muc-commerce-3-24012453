<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布信息 - 校园轻集市</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-wrapper">
  <nav class="navbar"><div class="navbar-inner">
    <a href="home.html" class="navbar-brand"><div class="brand-icon">🏪</div>校园轻集市</a>
    <div class="navbar-nav">
      <a href="home.html" class="nav-link">🏠 首页</a>
      <a href="category.html" class="nav-link">📋 浏览集市</a>
      <a href="publish.html" class="nav-link active">✏️ 发布信息</a>
      <div class="navbar-actions">
        <a href="messages.html" class="btn btn-ghost btn-icon" title="消息">💬</a>
        <a href="profile.html" class="btn btn-ghost btn-icon" title="个人中心">👤</a>
      </div>
    </div>
  </div></nav>

  <div class="main-content"><div class="container">
    <div class="page-header">
      <h1 class="page-title">✏️ 发布校园信息</h1>
      <p class="page-subtitle">选择你要发布的信息类型，帮助校园里的其他同学</p>
    </div>

    <div class="type-select-grid">
      <a href="publish-item.html" class="type-select-card">
        <div class="type-icon">🛒</div>
        <div class="type-name">二手交易</div>
        <div style="font-size:12px;color:var(--text-tertiary);margin-top:4px;">发布闲置物品，让物品流转起来</div>
      </a>
      <a href="publish-lost.html" class="type-select-card">
        <div class="type-icon">🔍</div>
        <div class="type-name">失物招领</div>
        <div style="font-size:12px;color:var(--text-tertiary);margin-top:4px;">发布失物或拾物信息，互相帮助</div>
      </a>
      <a href="publish-group.html" class="type-select-card">
        <div class="type-icon">🤝</div>
        <div class="type-name">拼单搭子</div>
        <div style="font-size:12px;color:var(--text-tertiary);margin-top:4px;">发起拼单或寻找搭子，结伴同行</div>
      </a>
      <a href="publish-task.html" class="type-select-card">
        <div class="type-icon">🏃</div>
        <div class="type-name">跑腿委托</div>
        <div style="font-size:12px;color:var(--text-tertiary);margin-top:4px;">发布临时任务，找人帮忙跑腿</div>
      </a>
    </div>

    <div class="safety-notice">
      <div class="safety-icon">💡</div>
      <div class="safety-text"><strong>发布提示：</strong>请填写真实准确的信息。交易请选择公共区域进行，贵重物品建议当面验机。请勿泄露个人隐私信息。</div>
    </div>
  </div></div>
</div>
</body>
</html>
